          minLength: 1
          maxLength: 160
        status:
          type: string
          enum: [active, archived]
        last_message_at:
          type: [string, "null"]
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        version:
          type: integer
          minimum: 1
    ConversationCreate:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 160
    ConversationUpdate:
      type: object
      additionalProperties: false
      required: [title, version]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 160
        version:
          type: integer
          minimum: 1
    ConversationArchive:
      type: object
      additionalProperties: false
      required: [version]
      properties:
        version:
          type: integer
          minimum: 1
    ConversationList:
      type: object
      additionalProperties: false
      required: [items, meta]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Conversation"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

