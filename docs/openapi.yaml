  /auth/social/exchange:
    post:
      tags: [Auth]
      operationId: exchangeSocialCredential
      summary: Войти через Telegram, Google или Apple
      description: |
        Backend проверяет token/code непосредственно у провайдера. Если передан
        X-Session-Token, создание/вход в аккаунт и перенос гостевых данных выполняются
        атомарно: при ошибке не меняются ни сессия, ни данные, ни membership.
      security:
        - SessionAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialAuthExchangeRequest"
            examples:
              google:
                value:
                  provider: google
                  credential_type: authorization_code
                  credential: 4/0AfJohX...
                  redirect_uri: autodoctor://auth/google/callback
              telegram:
                value:
                  provider: telegram
                  credential_type: token
                  credential: tg_login_payload_or_token
      responses:
        "200":
          description: Вход выполнен; гостевые данные атомарно объединены при наличии сессии
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"

