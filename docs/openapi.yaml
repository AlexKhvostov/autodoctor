    ConsumableIntervalDimension:
      type: object
      additionalProperties: false
      required: [used_fraction, due]
      properties:
        used_fraction:
          type: [number, "null"]
          minimum: 0
          description: |
            Потреблённая доля проверенного интервала; может быть больше 1.
            Это не physical wear, remaining life или ресурс детали.
        due:
          oneOf:
            - $ref: "#/components/schemas/MaintenanceDue"
            - type: "null"
    ConsumableIntervalThresholds:
      type: object
      additionalProperties: false
      required: [warning_at, danger_at]
      properties:
        warning_at:
          type: number
          minimum: 0
        danger_at:
          type: number
          minimum: 0
          description: Должно быть больше либо равно warning_at.
    ConsumableIntervalPresentation:
      type: object
      additionalProperties: false
      required: [kind, time, mileage, effective_used_fraction, effective_trigger, derived_state, thresholds]
      properties:
        kind:
          type: string
          const: interval_based
        time:
          oneOf:
            - $ref: "#/components/schemas/ConsumableIntervalDimension"
            - type: "null"
        mileage:
          oneOf:
            - $ref: "#/components/schemas/ConsumableIntervalDimension"
            - type: "null"
        effective_used_fraction:
          type: [number, "null"]
          minimum: 0
          description: Максимум известных time/mileage used_fraction по правилу earliest trigger.
        effective_trigger:
          $ref: "#/components/schemas/ConsumableDueTrigger"
        derived_state:
          $ref: "#/components/schemas/ConsumableDerivedState"
        thresholds:
          $ref: "#/components/schemas/ConsumableIntervalThresholds"
    ConsumableConditionPresentation:
      type: object
      additionalProperties: false
      required: [kind, inspection_state, latest_observation, thresholds, derived_state]
      description: |
        Latest observation для numeric subset показывает отдельно measured wear_percent
        и derived remaining_percent. Без observation оба отсутствуют; qualitative items
        остаются inspection-only. Wear не является OEM remaining-life и не даёт next due.
      properties:
        kind:
          type: string
          const: condition_based
        inspection_state:
