    JournalFilter:
      type: string
      enum: [all, service, fuel, other_expense]
      default: all
    EventPrimaryCategory:
      type: string
      enum: [maintenance_repair, parts, fuel, inspection, document, mileage, expense, reminder]
      description: |
        Ровно одна категория для component icon. Она не образует отдельный badge.
        Детерминированная матрица:
        service_record=maintenance_repair; expense fuel=fuel; expense parts=parts;
        прочий expense=expense; odometer=mileage; document=document; reminder=reminder;
        inspection-only plan item=inspection; standalone part replacement=parts;
        остальные plan items=maintenance_repair. Source/history/category details
        доступны в expanded domain object.
    ActionLevel:
      type: string
      enum: [info, recommendation, attention, required, critical]
      description: |
        Единый пользовательский сигнал действия. Higher-wins mapping:
        immediate|critical_attention -> critical;
        high|overdue|requires_check_now -> required;
        medium|soon -> attention; recommended -> recommendation; остальные -> info.
        Overdue без safety/immediate не становится critical.
    PresentationBasis:
      type: string
      enum: [confirmed, forecast, missing_data]
      description: |
        Основа compact presentation: confirmed для подтверждённого факта/основания,
        forecast для display-only оценки, missing_data для unresolved обязательных данных.
    FutureEventImportance:
      type: string
      enum: [info, recommended, required, critical_attention]
      description: |
        Presentation-only значимость будущего события. Матрица (первая совпавшая строка):
        safety_critical -> critical_attention; urgency=immediate -> critical_attention;
        regulation+overdue -> critical_attention; regulation+current/soon -> required;
        recommendation -> recommended; forecast/awareness -> info. Low recommendation,
        даже overdue, остаётся recommended без safety_critical/immediate. Exact status,
        criticality, urgency и rule_type передаются отдельно.
    EventMoment:
      type: object
      additionalProperties: false
      required: [kind, at]
      properties:
        kind:
          type: string
          const: moment
        at:
          type: string
          description: Точная RFC 3339 date либо date-time без подстановки прогнозной даты.
    EventPeriod:
      type: object
      additionalProperties: false
      required: [kind, from, to]
      properties:
        kind:
          type: string
          const: period
        from:
          type: string
          description: Начало RFC 3339 date/date-time периода.
        to:
          type: string
          description: Конец RFC 3339 date/date-time периода.
    EventTemporal:
      oneOf:
        - $ref: "#/components/schemas/EventMoment"
        - $ref: "#/components/schemas/EventPeriod"
      discriminator:
        propertyName: kind
        mapping:
          moment: "#/components/schemas/EventMoment"
          period: "#/components/schemas/EventPeriod"
    ActualEventPresentation:
      type: object
      additionalProperties: false
      description: Compact presentation фактического события с двумя пользовательскими сигналами.
      required: [title, temporal, mileage, primary_category, action_level, basis]
      properties:
        title:
