    ChatMessageRequest:
      type: object
      additionalProperties: false
      required: [conversation_id, text]
      properties:
        conversation_id:
          type: string
          format: uuid
          description: Должен совпадать с conversationId пути и принадлежать vehicleId.
        text:
          type: string
          minLength: 1
          maxLength: 4000
        client_message_id:
          type: string
          format: uuid
    ChatRole:
      type: string
      enum: [user, assistant]
    ChatMessage:
      type: object
      additionalProperties: false
      required: [id, conversation_id, role, text, created_at]
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/ChatRole"
        text:
          type: string
        facts:
          type: array
          items:
            type: string
        assumptions:
          type: array
          items:
            type: string
        safety_level:
          type: string
          enum: [normal, caution, stop_driving]
        citations:
          type: array
          items:
            $ref: "#/components/schemas/ChatCitation"
        problem_assessment:
          oneOf:
            - $ref: "#/components/schemas/ProblemAssessment"
            - type: "null"
          description: Обязателен для assistant-ответа на вопрос о симптоме или неисправности.
        safety_override:
          $ref: "#/components/schemas/SafetyOverride"
          description: Сохраняется с assistant message для повторного безопасного показа истории.
        created_at:
          type: string
          format: date-time
    ChatMessageList:
      type: object
      additionalProperties: false
      required: [items, meta]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
    ChatCitation:
      type: object
      additionalProperties: false
      required: [type, reference_id, title]
      properties:
        type:
          type: string
          enum: [maintenance_rule, maintenance_source, service_record]
        reference_id:
          type: string
        title:
          type: string
    AssessmentConfidence:
      type: number
      minimum: 0
      maximum: 1
    ProblemLikelyCause:
      type: object
      additionalProperties: false
      required: [title, confidence, status]
      properties:
        title:
          type: string
        confidence:
          $ref: "#/components/schemas/AssessmentConfidence"
        status:
          type: string
          const: hypothesis
    UrgencyAssessment:
      type: object
      additionalProperties: false
      required: [score, explanation, status]
      allOf:
        - if:
            properties:
              score:
                const: 5
            required: [score]
          then:
            properties:
              status:
                const: do_not_drive
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 5
        explanation:
          type: string
        status:
          type: string
          enum: [monitor, plan_service, prompt_service, urgent, do_not_drive]
    ComplexityAssessment:
      type: object
      additionalProperties: false
      required: [score, explanation, recommended_executor, estimated_time, parts_availability]
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 5
        explanation:
          type: string
        recommended_executor:
          type: string
          enum: [owner, general_service, specialist_service]
        estimated_time:
          type: string
        parts_availability:
          type: string
          enum: [not_required, common, limited, unknown]
    BynAmountRange:
      type: object
      additionalProperties: false
      required: [min, max, currency]
      properties:
        min:
          type: number
          minimum: 0
        max:
          type: number
          minimum: 0
        currency:
          type: string
          const: BYN
    VerifiedCostSource:
      type: object
      additionalProperties: false
      required: [id, title]
      properties:
        id:
          type: string
        title:
          type: string
        url:
          type: string
          format: uri
    CostAssessment:
      type: object
      additionalProperties: false
      required: [score, total, parts, labor, region, as_of, source, confidence]
      description: |
        Допустим только при verified regional data. Отсутствие данных означает отсутствие
        всего cost object, а не score=0. Модель AI не создаёт и не дополняет стоимость.
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 5
        total:
          $ref: "#/components/schemas/BynAmountRange"
        parts:
          $ref: "#/components/schemas/BynAmountRange"
        labor:
          $ref: "#/components/schemas/BynAmountRange"
        region:
          type: string
          example: BY
        as_of:
          type: string
          format: date
        source:
          $ref: "#/components/schemas/VerifiedCostSource"
        confidence:
          $ref: "#/components/schemas/AssessmentConfidence"
    ProblemAssessment:
      type: object
      additionalProperties: false
      required: [likely_causes, urgency, complexity, recommended_next_step]
      description: Независимые оценки без average/overall score.
      properties:
        likely_causes:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ProblemLikelyCause"
        urgency:
          $ref: "#/components/schemas/UrgencyAssessment"
        complexity:
          $ref: "#/components/schemas/ComplexityAssessment"
        cost:
          oneOf:
            - $ref: "#/components/schemas/CostAssessment"
            - type: "null"
          description: Может отсутствовать либо быть null, если verified regional data нет.
        recommended_next_step:
          type: object
          additionalProperties: false
          required: [title, action]
          properties:
            title:
              type: string
              const: Что делать сейчас
            action:
              type: string
    SafetyOverride:
      type: object
      additionalProperties: false
      required: [status, evaluated_before_model, rule_set_version, matched_rule_ids]
      allOf:
        - if:
            properties:
              status:
                enum: [warning, do_not_drive]
            required: [status]
          then:
            required: [title, message, icon]
      properties:
        status:
          type: string
          enum: [none, warning, do_not_drive]
        evaluated_before_model:
          type: boolean
          const: true
        rule_set_version:
          type: string
        matched_rule_ids:
          type: array
          uniqueItems: true
          items:
            type: string
        title:
          type: string
        message:
          type: string
        icon:
          type: string
          enum: [info, warning, stop]
    ChatExchange:
      type: object
      additionalProperties: false
      required: [conversation_id, user_message, safety_override, assistant_message, limits]
      properties:
        conversation_id:
          type: string
          format: uuid
        user_message:
          $ref: "#/components/schemas/ChatMessage"
        safety_override:
          $ref: "#/components/schemas/SafetyOverride"
          description: |
            Вычисляется до вызова provider/model. Клиент показывает warning сразу и выше
            assistant_message; статус не может быть понижен содержимым AI-ответа.
        assistant_message:
          $ref: "#/components/schemas/ChatMessage"
        limits:
          type: object
          additionalProperties: false
          required: [remaining, resets_at]
          properties:
            remaining:
              type: integer
              minimum: 0
            resets_at:
              type: string
              format: date-time
    Conversation:
