        thresholds:
          oneOf:
            - $ref: "#/components/schemas/ConditionWearThresholds"
            - type: "null"
        derived_state:
          $ref: "#/components/schemas/ConsumableDerivedState"
          description: warning/action thresholds drive urgency; safety-critical action is danger/red.
    ConsumableProjectionBase:
      type: object
      required: [id, vehicle_id, work_code, title, status, criticality, urgency, future_importance, due, basis, requires_check_now, history_impact, history_state, source, source_rule_id, plan_item_link]
      properties:
