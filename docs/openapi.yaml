      responses:
        "202":
          description: Запрос принят независимо от существования email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Accepted"
        "429":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"

  /auth/password/reset/confirm:
    post:
      tags: [Auth]
      operationId: confirmPasswordReset
      summary: Установить новый пароль по одноразовому коду
      security: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetConfirmRequest"
      responses:
        "204":
          description: Пароль изменён, прежние токены отозваны
        "422":
          $ref: "#/components/responses/ValidationError"
        default:
          $ref: "#/components/responses/Error"

  /me:
    get:
      tags: [Account]
      operationId: getMe
      summary: Получить профиль аккаунта
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Профиль аккаунта
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        default:
          $ref: "#/components/responses/Error"
    patch:
      tags: [Account]
      operationId: updateMe
      summary: Изменить настройки аккаунта
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountPatch"
      responses:
        "200":
          description: Профиль обновлён
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "422":
          $ref: "#/components/responses/ValidationError"
        default:
          $ref: "#/components/responses/Error"
    delete:
      tags: [Account]
      operationId: deleteMe
      summary: Запросить удаление аккаунта и данных
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAccountRequest"
      responses:
        "202":
          description: Удаление принято в обработку
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletionAccepted"
        "401":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"

  /me/export:
    get:
      tags: [Account]
      operationId: exportMyData
      summary: Выгрузить данные аккаунта
      security:
        - BearerAuth: []
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [json, zip]
            default: json
      responses:
        "200":
          description: Машиночитаемая выгрузка
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountExport"
            application/zip:
              schema:
                type: string
                contentEncoding: binary
        default:
          $ref: "#/components/responses/Error"

  /feedback:
    post:
      tags: [Feedback]
      operationId: submitProductFeedback
      summary: Отправить общую обратную связь о пилоте
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductFeedbackRequest"
      responses:
        "201":
          description: Обратная связь сохранена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feedback"
        "422":
          $ref: "#/components/responses/ValidationError"
        default:
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    SessionAuth:
      type: apiKey
      in: header
      name: X-Session-Token
      description: Токен анонимной гостевой сессии.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Короткоживущий access-токен зарегистрированного пользователя.

  parameters:
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      description: |
        Язык локализованных текстов и ошибок: `ru` или `en`; региональные теги
        (`ru-BY`, `en-US`) нормализуются до базового языка. Для публичных запросов
        и ошибок до аутентификации отсутствие или неподдерживаемое значение даёт `ru`.
        После успешной аутентификации анонимной сессии отсутствие заголовка использует
        сохранённый `session.locale`; переданный заголовок имеет приоритет.
      schema:
        type: string
        examples: [ru, en, ru-BY, en-US]
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Уникальный UUID операции; повтор с тем же телом возвращает прежний результат.
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    VehicleId:
      name: vehicleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExpenseId:
      name: expenseId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    HistoryId:
      name: historyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReminderId:
      name: reminderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MessageId:
      name: messageId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    PlanPreparing:
      description: Published ruleset или snapshot временно недоступен; безопасно повторить GET.
      headers:
        Retry-After:
          schema:
            type: integer
            minimum: 1
          description: Рекомендуемая задержка повторной попытки в секундах.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: PLAN_PREPARING
              message: План пока подготавливается. Повторите запрос.
              request_id: req_01J2Y6D8QK3R7T5V9W1X
    Error:
      description: Ошибка запроса
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: VEHICLE_NOT_SUPPORTED
              message: Для этого автомобиля проверенные данные пока не подготовлены.
              request_id: req_01J2Y6D8QK3R7T5V9W1X
              details:
                support_request_id: 7ea2c18f-a6cf-4c19-95c4-c4cb56a701b7
    ValidationError:
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: VALIDATION_FAILED
              message: Проверьте заполненные поля.
              request_id: req_01J2Y6D8QK3R7T5V9W1X
              fields:
                mileage.value:
                  - Значение должно быть неотрицательным.

  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status, service, version, time]
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
          const: autodoctor-api
        version:
          type: string
        time:
          type: string
          format: date-time

    Capabilities:
      type: object
      additionalProperties: false
      required: [public_browse, anonymous_sessions, social_auth_providers, email_password_auth, max_vehicles_per_user]
      properties:
        public_browse:
          type: boolean
          const: true
        anonymous_sessions:
          type: boolean
          const: true
        social_auth_providers:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/SocialAuthProvider"
        email_password_auth:
          type: boolean
          description: Опциональная возможность; false допустим и ожидаем для MVP.
        max_vehicles_per_user:
          type: integer
          minimum: 1
          description: Серверный лимит коллекции; значение пилота по умолчанию 1 и может быть повышено.

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, request_id]
          properties:
            code:
              type: string
              pattern: "^[A-Z][A-Z0-9_]+$"
            message:
              type: string
            request_id:
              type: string
            fields:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
            details:
              type: object
              additionalProperties: true

    Timestamps:
      type: object
      required: [created_at, updated_at, version]
      properties:
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        version:
          type: integer
          minimum: 1

    PaginationMeta:
      type: object
      additionalProperties: false
      required: [page, per_page, total, total_pages]
      properties:
        page:
          type: integer
          minimum: 1
        per_page:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0

    MileageUnit:
      type: string
      enum: [km, mi]
    Mileage:
      type: object
      additionalProperties: false
      required: [value, unit]
      properties:
        value:
          type: integer
          minimum: 0
        unit:
          $ref: "#/components/schemas/MileageUnit"

    CreateSessionRequest:
      type: object
      additionalProperties: false
      required: [locale, platform]
      properties:
        locale:
          type: string
          pattern: "^(ru|en)([-_][A-Za-z]{2})?$"
          description: |
            Предпочитаемый язык сессии. Поддерживаются `ru`, `en` и региональные
            теги; сервер сохраняет нормализованный базовый язык `ru` или `en`.
          examples: [ru, en, ru-BY, en-US]
        platform:
          type: string
          enum: [android, ios]
        app_version:
          type: string
    AnonymousSessionCreated:
      type: object
      additionalProperties: false
      required: [session, session_token]
      properties:
        session:
          $ref: "#/components/schemas/Session"
        session_token:
          type: string
    Session:
      type: object
      additionalProperties: false
      required: [id, status, expires_at, created_at, updated_at, version]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, linked, expired, closed]
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        version:
          type: integer
          minimum: 1

    ConsentPurpose:
      type: string
      enum: [essential_processing, ai_processing, analytics, marketing]
    ConsentDocument:
      type: object
      additionalProperties: false
      required: [purpose, version, title, text, required]
      properties:
        purpose:
          $ref: "#/components/schemas/ConsentPurpose"
        version:
          type: string
        title:
          type: string
        text:
          type: string
        required:
          type: boolean
        effective_at:
          type: string
          format: date-time
    GrantConsentsRequest:
      type: object
      additionalProperties: false
      required: [decisions]
      properties:
        decisions:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required: [purpose, version, granted]
            properties:
              purpose:
                $ref: "#/components/schemas/ConsentPurpose"
              version:
                type: string
              granted:
                type: boolean
    ConsentReceipt:
      type: object
      additionalProperties: false
      required: [id, purpose, version, granted, decided_at]
      properties:
        id:
          type: string
          format: uuid
        purpose:
          $ref: "#/components/schemas/ConsentPurpose"
        version:
          type: string
        granted:
          type: boolean
        decided_at:
          type: string
          format: date-time

    DecodeVinRequest:
      type: object
      additionalProperties: false
      required: [vin, mileage, production_year]
      properties:
        vin:
          $ref: "#/components/schemas/VinInput"
        mileage:
          $ref: "#/components/schemas/Mileage"
        production_year:
          type: integer
          minimum: 1886
          maximum: 2100
        first_use_date:
          type: string
          format: date
    VinDecodeStatus:
      type: string
      description: Единый будущий статус VIN decode; не является статусом профиля.
      enum: [decoded, ambiguous, unsupported, pending_review]
    VehicleConfiguration:
      type: object
      additionalProperties: false
      required: [id, make, model, model_year, engine, fuel_type, transmission, confidence]
      properties:
        id:
          type: string
        make:
          type: string
        model:
          type: string
        generation:
          type: [string, "null"]
        model_year:
          type: integer
          minimum: 1886
        engine:
          type: string
        fuel_type:
          type: string
          enum: [petrol, diesel, hybrid, electric, lpg, other]
        power_kw:
          type: [number, "null"]
          minimum: 0
        transmission:
          type: string
          enum: [manual, automatic, cvt, robotized, other]
        drivetrain:
          type: string
          enum: [fwd, rwd, awd, four_wd, other]
        market:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
    VinDecodeResult:
      type: object
      additionalProperties: false
      required: [decode_id, status, configurations, expires_at]
      properties:
        decode_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/VinDecodeStatus"
        configurations:
          type: array
          items:
            $ref: "#/components/schemas/VehicleConfiguration"
        support_request_id:
          type: [string, "null"]
          format: uuid
        expires_at:
          type: string
          format: date-time
    ConfirmVehicleRequest:
      type: object
      additionalProperties: false
      required: [decode_id, configuration_id, mileage, production_year]
      properties:
        decode_id:
          type: string
          format: uuid
        configuration_id:
          type: string
        mileage:
          $ref: "#/components/schemas/Mileage"
        production_year:
          type: integer
          minimum: 1886
          maximum: 2100
        first_use_date:
          type: string
          format: date
        usage_conditions:
          type: array
          uniqueItems: true
          items:
            type: string
            enum: [city, highway, mixed, severe, cold_climate]
    CreateVehicleRequest:
      type: object
      additionalProperties: false
      description: |
        Минимальный manual-first ввод требует make, model, production_year, fuel_type
        и engine. Для fuel_type petrol/diesel/hybrid/lpg
        engine.displacement_cc обязателен; для electric он должен отсутствовать либо
        быть null; для other он nullable. VIN, mileage и transmission optional.
        Если transmission передан, type равен manual или automatic; gears optional.
        Каталог make/model не является enum: API принимает нормализованные строки до 100.
      required: [make, model, production_year, fuel_type, engine]
      properties:
        vin:
          anyOf:
            - $ref: "#/components/schemas/VinInput"
            - type: "null"
          description: Optional write-only VIN; null и отсутствие означают профиль без VIN.
        make:
          type: string
          minLength: 1
          maxLength: 100
        model:
          type: string
          minLength: 1
          maxLength: 100
        generation:
          type: [string, "null"]
          maxLength: 100
        mileage:
          anyOf:
            - $ref: "#/components/schemas/Mileage"
            - type: "null"
          description: Optional. Initial manual observation создаётся только при объекте mileage.
        production_year:
          type: integer
          minimum: 1886
          maximum: 2100
        first_use_date:
          type: [string, "null"]
          format: date
        fuel_type:
          $ref: "#/components/schemas/FuelType"
        engine:
          $ref: "#/components/schemas/ManualEngine"
        transmission:
          anyOf:
            - $ref: "#/components/schemas/ManualTransmission"
            - type: "null"
        drivetrain:
          anyOf:
            - $ref: "#/components/schemas/Drivetrain"
            - type: "null"
        market:
          type: [string, "null"]
          maxLength: 100
      allOf:
        - if:
            properties:
              fuel_type:
                enum: [petrol, diesel, hybrid, lpg]
            required: [fuel_type]
          then:
            properties:
              engine:
                required: [displacement_cc]
                properties:
                  displacement_cc:
                    type: integer
                    minimum: 1
                    maximum: 20000
        - if:
            properties:
              fuel_type:
                const: electric
            required: [fuel_type]
          then:
            properties:
              engine:
                properties:
                  displacement_cc:
                    type: "null"
    UpdateVehicleRequest:
      type: object
      additionalProperties: false
      minProperties: 2
      description: |
        Разрешены только перечисленные поля и обязательный version. Backend применяет
        patch к текущему профилю и валидирует итоговый объект по тем же условным правилам,
        что CreateVehicleRequest. Отсутствующее поле сохраняет persisted value; явный null
        очищает nullable optional field. Обязательные make/model/production_year/fuel_type/engine
        нельзя очистить. Снижение mileage допускается только отдельным endpoint с reason rules.
      required: [version]
      properties:
        make:
          type: string
          minLength: 1
          maxLength: 100
        model:
          type: string
          minLength: 1
          maxLength: 100
        generation:
          type: [string, "null"]
          maxLength: 100
        vin:
          anyOf:
            - $ref: "#/components/schemas/VinInput"
            - type: "null"
          description: Объект добавляет/заменяет VIN; null очищает VIN и его derived storage fields.
        mileage:
          anyOf:
            - $ref: "#/components/schemas/Mileage"
            - type: "null"
          description: Объект добавляет пробег; null очищает nullable profile projection без удаления immutable observations.
        production_year:
          type: integer
          minimum: 1886
          maximum: 2100
        first_use_date:
          type: [string, "null"]
          format: date
        fuel_type:
          $ref: "#/components/schemas/FuelType"
        engine:
          $ref: "#/components/schemas/ManualEngine"
        transmission:
          anyOf:
            - $ref: "#/components/schemas/ManualTransmission"
            - type: "null"
        drivetrain:
          anyOf:
            - $ref: "#/components/schemas/Drivetrain"
            - type: "null"
        market:
          type: [string, "null"]
          maxLength: 100
        version:
          type: integer
          minimum: 1
    VinInput:
      type: string
      minLength: 17
      maxLength: 17
      pattern: "^[A-HJ-NPR-Z0-9]{17}$"
      writeOnly: true
      description: Ровно 17 uppercase VIN-символов; I, O и Q запрещены.
    FuelType:
      type: string
      enum: [petrol, diesel, hybrid, electric, lpg, other]
    Drivetrain:
      type: string
      enum: [fwd, rwd, awd, four_wd, other]
    TransmissionType:
      type: string
      enum: [manual, automatic]
    ManualEngine:
      type: object
      additionalProperties: false
      properties:
        displacement_cc:
          type: [integer, "null"]
          minimum: 1
          maximum: 20000
        engine_code:
          type: [string, "null"]
          maxLength: 100
        power_kw:
          type: [number, "null"]
          exclusiveMinimum: 0
          maximum: 2000
    ManualTransmission:
      type: object
      additionalProperties: false
      required: [type]
      properties:
        type:
          $ref: "#/components/schemas/TransmissionType"
        gears:
          type: [integer, "null"]
          minimum: 1
          maximum: 12
    VehicleProfileStatus:
      type: string
      description: Manual create всегда начинает с pending_review.
      enum: [pending_review, confirmed]
    RecommendationScope:
      type: string
      description: |
        pending_review допускает universal_type_only. specific_oem_allowed возможен
        только после curated admin или trusted provider confirmation.
      enum: [universal_type_only, specific_oem_allowed]
    VehicleFieldSource:
      type: string
      enum: [user, curated_admin, trusted_provider]
    VehicleFieldProvenance:
      type: object
      additionalProperties: false
      required: [source, confirmed_at]
      properties:
        source:
          $ref: "#/components/schemas/VehicleFieldSource"
        confirmed_at:
          type: string
          format: date-time
    VehicleProvenance:
      type: object
      additionalProperties: false
      description: Optional properties присутствуют только для фактически переданных полей.
      required: [make, model, production_year, fuel_type, engine]
      properties:
        vin:
          $ref: "#/components/schemas/VehicleFieldProvenance"
        make:
          $ref: "#/components/schemas/VehicleFieldProvenance"
        model:
          $ref: "#/components/schemas/VehicleFieldProvenance"
        generation:
          $ref: "#/components/schemas/VehicleFieldProvenance"
        production_year:
          $ref: "#/components/schemas/VehicleFieldProvenance"
        mileage:
          $ref: "#/components/schemas/VehicleFieldProvenance"
        first_use_date:
          $ref: "#/components/schemas/VehicleFieldProvenance"
        fuel_type:
          $ref: "#/components/schemas/VehicleFieldProvenance"
        engine:
          $ref: "#/components/schemas/VehicleFieldProvenance"
        transmission:
          $ref: "#/components/schemas/VehicleFieldProvenance"
        drivetrain:
          $ref: "#/components/schemas/VehicleFieldProvenance"
        market:
          $ref: "#/components/schemas/VehicleFieldProvenance"
    VehicleEnrichmentProposal:
      type: object
      additionalProperties: false
      description: |
        FUTURE CONTRACT. Черновик предложения не меняет Vehicle до явного accept.
        AI web search не допускается как source of truth safety-critical конфигурации.
      required: [field, proposed_value, source, source_url, as_of, confidence]
      properties:
        field:
          type: string
          enum: [make, model, generation, production_year, fuel_type, engine, transmission, drivetrain, market]
        proposed_value: {}
        source:
          type: string
        source_url:
          type: string
          format: uri
        as_of:
          type: string
          format: date
        confidence:
          type: number
          minimum: 0
          maximum: 1
    Vehicle:
      type: object
      additionalProperties: false
      description: |
        Профиль автомобиля; открытый VIN отсутствует во всех ответах. Nullable
        vin_masked/mileage/transmission явно отражают неполный профиль. pending_review
        получает только universal_type_only; specific OEM plan требует verified configuration.
      required: [id, vin_masked, make, model, production_year, mileage, fuel_type, engine, transmission, profile_status, recommendation_scope, provenance, created_at, updated_at, version]
      example:
        id: 4cf4f8e1-65de-4ac0-a62c-f1f90710a672
        vin_masked: null
        make: Mazda
        model: CX-5
        generation: null
        mileage: null
        production_year: 2020
        first_use_date: null
        fuel_type: petrol
        engine:
          displacement_cc: 1998
          engine_code: null
          power_kw: null
        transmission: null
        drivetrain: null
        market: null
        profile_status: pending_review
        recommendation_scope: universal_type_only
        provenance:
          make: {source: user, confirmed_at: "2026-07-19T12:00:00Z"}
          model: {source: user, confirmed_at: "2026-07-19T12:00:00Z"}
          production_year: {source: user, confirmed_at: "2026-07-19T12:00:00Z"}
          fuel_type: {source: user, confirmed_at: "2026-07-19T12:00:00Z"}
          engine: {source: user, confirmed_at: "2026-07-19T12:00:00Z"}
        created_at: "2026-07-19T12:00:00Z"
        updated_at: "2026-07-19T12:00:00Z"
        version: 1
      properties:
        id:
          type: string
          format: uuid
        vin_masked:
          type: [string, "null"]
          readOnly: true
          pattern: "^[A-HJ-NPR-Z0-9]{3}\\*{10}[A-HJ-NPR-Z0-9]{4}$"
          example: WVG**********3456
        make:
          type: string
          minLength: 1
          maxLength: 100
        model:
          type: string
          minLength: 1
          maxLength: 100
        generation:
          type: [string, "null"]
        mileage:
          anyOf:
            - $ref: "#/components/schemas/Mileage"
            - type: "null"
          description: Null означает отсутствие подтверждённого начального пробега.
        production_year:
          type: integer
          minimum: 1886
          maximum: 2100
        first_use_date:
          type: [string, "null"]
          format: date
        fuel_type:
          $ref: "#/components/schemas/FuelType"
        engine:
          $ref: "#/components/schemas/ManualEngine"
        transmission:
          anyOf:
            - $ref: "#/components/schemas/ManualTransmission"
            - type: "null"
        drivetrain:
          anyOf:
            - $ref: "#/components/schemas/Drivetrain"
            - type: "null"
        market:
          type: [string, "null"]
        profile_status:
          $ref: "#/components/schemas/VehicleProfileStatus"
        recommendation_scope:
          $ref: "#/components/schemas/RecommendationScope"
        provenance:
          $ref: "#/components/schemas/VehicleProvenance"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        version:
          type: integer
          minimum: 1
    VehicleList:
      type: object
