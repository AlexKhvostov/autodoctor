    MileageForecastWindow:
      type: object
      additionalProperties: false
      required: [plan_item_id, title]
      dependentRequired:
        from: [to]
        to: [from]
      properties:
        plan_item_id:
          type: string
        title:
          type: string
        from:
          type: string
          format: date
          description: Нижняя граница оценки; отсутствует, если её нельзя обосновать.
        to:
          type: string
          format: date
          description: Верхняя граница оценки; отсутствует, если её нельзя обосновать.
        due_mileage:
          $ref: "#/components/schemas/Mileage"
    MileageForecast:
      type: object
      additionalProperties: false
      description: |
        Производный прогноз. Не является подтверждённым пробегом и не может сам
        переводить работы или напоминания в overdue.
      required: [vehicle_id, annual_distance, method, confidence, observation_count, estimate_label, next_work_window, algorithm_version, input_hash, calculated_at, last_confirmed_observation]
      properties:
        vehicle_id:
          type: string
          format: uuid
        annual_distance:
          $ref: "#/components/schemas/Mileage"
        method:
          type: string
          enum: [default_assumption, empirical]
          description: default_assumption обязателен при менее чем 2 usable observations.
        next_work_window:
          oneOf:
            - $ref: "#/components/schemas/MileageForecastWindow"
            - type: "null"
        confidence:
          type: string
          enum: [low, medium, high]
        observation_count:
          type: integer
          minimum: 0
          description: Число usable confirmed observations эмпирического входа.
        estimate_label:
          type: string
          description: Локализованная явная маркировка оценки, не подтверждённого факта.
        algorithm_version:
          type: string
          const: mileage-forecast-v1
        input_hash:
          type: string
          description: Hash canonical deterministic input; допускает lightweight audit.
        calculated_at:
          type: string
          format: date-time
        last_confirmed_observation:
          oneOf:
            - $ref: "#/components/schemas/MileageObservation"
            - type: "null"

    MaintenanceStatus:
      type: string
      enum: [unknown, current, soon, overdue, completed, not_applicable]
    Criticality:
      type: string
      description: Постоянное свойство регламентного правила.
      enum: [low, medium, high, safety_critical]
    Urgency:
      type: string
      description: Вычисляемая срочность действия для конкретного автомобиля.
      enum: [none, low, medium, high, immediate]
    RuleLevel:
      type: string
      enum: [universal, regional, type_based, specific]
    RuleType:
      type: string
      enum: [recommendation, regulation]
    MaintenanceSource:
      type: object
      additionalProperties: false
      required: [id, title, publisher, source_kind, official_oem, methodology_note]
      properties:
        id:
          type: string
        title:
          type: string
        publisher:
          type: string
        source_kind:
          type: string
          enum: [editorial_baseline, official_oem, regulatory]
        official_oem:
          type: boolean
          description: Для editorial_baseline всегда false.
        methodology_note:
          type: string
          description: Нелокализованная identity источника не подменяет локализованный basis.
        url:
          type: [string, "null"]
          format: uri
          description: Для internal editorial baseline null; фиктивные URL запрещены.
        effective_date:
          type: [string, "null"]
          format: date
        verified_at:
          type: [string, "null"]
          format: date-time
    MaintenanceDue:
      type: object
      additionalProperties: false
      properties:
        mileage:
          oneOf:
            - $ref: "#/components/schemas/Mileage"
            - type: "null"
        date:
          type: [string, "null"]
          format: date
    MaintenanceInterval:
      type: object
      additionalProperties: false
      required: [mileage_km, days]
      properties:
        mileage_km:
          type: [integer, "null"]
          minimum: 1
        days:
          type: [integer, "null"]
          minimum: 1
    HistoryState:
      type: object
      additionalProperties: false
      required: [answer, performed_date, performed_mileage_km]
      description: |
        Текущая latest declaration для prefill. answer=null означает, что пользователь
        ещё не сохранял ответ; это не service record и не событие хронологии.
      properties:
        answer:
          oneOf:
            - $ref: "#/components/schemas/HistoryAnswerValue"
            - type: "null"
        performed_date:
          type: [string, "null"]
          format: date
        performed_mileage_km:
          type: [integer, "null"]
          minimum: 0
    MaintenanceItem:
      type: object
      additionalProperties: false
      required: [id, work_code, title, status, criticality, urgency, rule_level, rule_type, rule_version, due, interval, basis, requires_check_now, history_impact, history_state, source]
      allOf:
        - if:
            properties:
              status:
                enum: [completed, not_applicable]
            required: [status]
          then:
            not:
              required: [presentation_importance]
          else:
            required: [presentation_importance]
      properties:
        id:
          type: string
          format: uuid
        work_code:
          $ref: "#/components/schemas/ServiceWorkCode"
        title:
          type: string
        status:
          $ref: "#/components/schemas/MaintenanceStatus"
        criticality:
          $ref: "#/components/schemas/Criticality"
        urgency:
          $ref: "#/components/schemas/Urgency"
        presentation_importance:
          $ref: "#/components/schemas/FutureEventImportance"
          description: |
            Только для будущего пункта. Отсутствует у completed/not_applicable и не заменяет
            status, criticality, urgency или rule_type.
        rule_level:
          $ref: "#/components/schemas/RuleLevel"
        rule_type:
          $ref: "#/components/schemas/RuleType"
        rule_version:
          type: integer
          minimum: 1
        due:
          $ref: "#/components/schemas/MaintenanceDue"
        interval:
          $ref: "#/components/schemas/MaintenanceInterval"
        basis:
          type: string
        history_impact:
          type: string
        requires_check_now:
          type: boolean
          description: true только для unresolved applicable history; не означает overdue.
        history_state:
          $ref: "#/components/schemas/HistoryState"
        source:
          $ref: "#/components/schemas/MaintenanceSource"
    MaintenancePlan:
      type: object
      additionalProperties: false
      required: [id, vehicle_id, ruleset_version, algorithm_version, config_version, as_of_date, input_hash, content_hash, calculated_at, soon_threshold, items, warnings]
      properties:
        id:
          type: string
          format: uuid
        vehicle_id:
          type: string
          format: uuid
        ruleset_version:
          type: string
          const: by-pilot-baseline-2
        algorithm_version:
          type: string
          const: maintenance-v3
        config_version:
          type: string
          const: condition-wear-v1
          const: maintenance-history-v1
        as_of_date:
          type: string
          format: date
          description: Входит в canonical input hash; новый день может изменить статус.
        input_hash:
          type: string
        content_hash:
          type: string
        calculated_at:
          type: string
          format: date-time
        soon_threshold:
          type: object
          additionalProperties: false
          required: [mileage_km, days]
          properties:
            mileage_km:
              type: integer
              minimum: 0
            days:
              type: integer
              minimum: 0
        items:
          type: array
          items:
            $ref: "#/components/schemas/MaintenanceItem"
        warnings:
          type: array
          uniqueItems: true
          description: |
            EDITORIAL_BASELINE_ONLY присутствует всегда. HISTORY_REQUIRED присутствует
            только если хотя бы один применимый non-not_applicable item unresolved.
            MILEAGE_NOT_PROVIDED присутствует при отсутствии confirmed current mileage.
          items:
            type: string
            enum: [EDITORIAL_BASELINE_ONLY, HISTORY_REQUIRED, MILEAGE_NOT_PROVIDED]

