      summary: Отправить сообщение в тематический диалог
      description: |
        conversation_id обязателен в теле и должен совпадать с conversationId пути.
        Сервер проверяет принадлежность диалога vehicleId. Run навсегда связан с
        исходными vehicleId/conversationId; контекст сообщений берётся только из этого диалога.
        Safety override вычисляется детерминированно до модели и возвращается отдельным
        полем, чтобы UI показал критическое предупреждение выше AI-ответа.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
