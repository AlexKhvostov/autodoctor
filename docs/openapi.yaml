openapi: 3.1.0
info:
  title: AutoDoctor API
  version: 0.1.0
  description: REST API закрытого MVP AutoDoctor.
servers:
  - url: https://api-dev.autodoctor.by/api/v1
    description: Development
  - url: https://api.autodoctor.by/api/v1
    description: Production
paths:
  /health:
    get:
      operationId: getHealth
      summary: Проверить доступность API
      responses:
        "200":
          description: API работает
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
components:
  schemas:
    Health:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
          const: autodoctor-api
