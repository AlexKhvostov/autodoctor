openapi: 3.1.0
info:
  title: AutoDoctor MVP API
  version: 1.2.0-draft
  description: |
    Контракт REST API guest-first manual-first MVP AutoDoctor по ТЗ v0.8.
    Публичный browse shell и создание гостевой сессии не требуют приглашения.
    VIN необязателен и принимается только в запросах; ответы содержат nullable vin_masked.
    Реализуемый срез профиля автомобиля не вызывает внешний VIN/AI provider.
    Maintenance v3 включает активные mileage forecast, condition observations,
    plan-item UI preferences и идемпотентный batch/upsert history answers.
    Источник by-pilot-baseline-2 — внутренняя редакционная методика AutoDoctor,
    не OEM/manual; опубликованные версии остаются immutable.
    /vehicles/decode и /vehicles/confirm сохранены только как будущий контракт enrichment.
    Все ресурсы автомобиля адресуются с vehicleId; сервер проверяет текущего владельца.
    Все даты и время передаются в UTC в формате RFC 3339.
    Filament AI admin использует внутренний серверный интерфейс: публичные мобильные
    endpoints конфигурации, playground и A/B experiments в этом контракте отсутствуют.
servers:
  - url: https://api-dev.autodoctor.by/api/v1
    description: Development
  - url: https://api.autodoctor.by/api/v1
    description: Production
tags:
  - name: System
  - name: Sessions
  - name: Consents
  - name: Vehicles
  - name: Maintenance
  - name: History
  - name: Journal
  - name: Expenses
  - name: Consumables
  - name: Documents
  - name: Reminders
  - name: Chat
  - name: Auth
  - name: Account
  - name: Feedback
security:
  - SessionAuth: []
  - BearerAuth: []
paths:
  /health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Проверить доступность API
      security: []
      responses:
        "200":
          description: API работает
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
              example:
                status: ok
                service: autodoctor-api
                version: 0.2.0-draft
                time: "2026-07-16T16:00:00Z"
        default:
          $ref: "#/components/responses/Error"

  /capabilities:
    get:
      tags: [System]
      operationId: getCapabilities
      summary: Получить публичные возможности и лимиты сервера
      security: []
      responses:
        "200":
          description: Возможности текущего окружения
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capabilities"
              example:
                public_browse: true
                anonymous_sessions: true
                social_auth_providers: [telegram, google, apple]
                email_password_auth: false
                max_vehicles_per_user: 1
        default:
          $ref: "#/components/responses/Error"

  /sessions/anonymous:
    post:
      tags: [Sessions]
      operationId: createAnonymousSession
      summary: Создать анонимную сессию
      security: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/AcceptLanguage"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
            example:
              locale: ru-BY
              platform: android
              app_version: 0.1.0
      responses:
        "201":
          description: Сессия создана; token показывается только один раз
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnonymousSessionCreated"
        "422":
          $ref: "#/components/responses/ValidationError"
        default:
          $ref: "#/components/responses/Error"

  /sessions/current:
    get:
      tags: [Sessions]
      operationId: getCurrentSession
      summary: Получить текущую сессию
      parameters:
        - $ref: "#/components/parameters/AcceptLanguage"
      responses:
        "200":
          description: Текущая сессия
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        default:
          $ref: "#/components/responses/Error"
    delete:
      tags: [Sessions]
      operationId: closeCurrentSession
      summary: Завершить текущую анонимную сессию
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/AcceptLanguage"
      responses:
        "204":
          description: Сессия завершена
        default:
          $ref: "#/components/responses/Error"

  /consents/current:
    get:
      tags: [Consents]
      operationId: getCurrentConsents
      summary: Получить актуальные тексты согласий
      security: []
      parameters:
        - $ref: "#/components/parameters/AcceptLanguage"
      responses:
        "200":
          description: Актуальные согласия
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConsentDocument"
              examples:
                ru:
                  summary: Русские тексты (по умолчанию)
                  value:
                    items:
                      - purpose: essential_processing
                        version: "2026-07-17"
                        title: Обязательная обработка данных
                        text: Обработка данных, необходимых для работы AutoDoctor, включая данные автомобиля.
                        required: true
                        effective_at: "2026-07-17T00:00:00Z"
                      - purpose: analytics
                        version: "2026-07-17"
                        title: Аналитика использования
                        text: Обезличенная аналитика помогает улучшать продукт. Решение не влияет на основные функции.
                        required: false
                        effective_at: "2026-07-17T00:00:00Z"
                en:
                  summary: English texts
                  value:
                    items:
                      - purpose: essential_processing
                        version: "2026-07-17"
                        title: Essential data processing
                        text: Processing of data required for AutoDoctor to operate, including vehicle data.
                        required: true
                        effective_at: "2026-07-17T00:00:00Z"
                      - purpose: analytics
                        version: "2026-07-17"
                        title: Usage analytics
                        text: Anonymized analytics helps us improve the product. Your decision does not affect core features.
                        required: false
                        effective_at: "2026-07-17T00:00:00Z"
        default:
          $ref: "#/components/responses/Error"

  /consents:
    post:
      tags: [Consents]
      operationId: grantConsents
      summary: Зафиксировать решения по согласиям
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/AcceptLanguage"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantConsentsRequest"
      responses:
        "201":
          description: Решения сохранены
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConsentReceipt"
        "422":
          $ref: "#/components/responses/ValidationError"
        default:
          $ref: "#/components/responses/Error"

  /vehicles:
    get:
      tags: [Vehicles]
      operationId: listVehicles
      summary: Получить автомобили пользователя
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/AcceptLanguage"
      responses:
        "200":
          description: Список автомобилей
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleList"
        "401":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Vehicles]
      operationId: createVehicle
      summary: Создать ручной профиль автомобиля
      description: |
        Лимит задаётся сервером и публикуется через /capabilities; схема коллекции
        не содержит жёсткого ограничения. Операция manual-first не вызывает VIN/AI provider.
        Если VIN передан, он шифруется, а HMAC keyed hash используется для дедупликации.
        Первоначальное mileage observation source=manual создаётся атомарно только
        при переданном mileage. Без VIN и mileage профиль создаётся нормально, но
        автоматическое enrichment/точная идентификация и точность пробеговых сроков ограничены.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/AcceptLanguage"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicleRequest"
            example:
              make: Volkswagen
              model: Tiguan
              fuel_type: petrol
              engine:
                displacement_cc: 1395
                engine_code: CZDA
                power_kw: 110
              production_year: 2019
      responses:
        "201":
          description: Ручной профиль создан; vin_masked/mileage/transmission могут быть null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "401":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/PlanPreparing"
        "422":
          $ref: "#/components/responses/ValidationError"
        default:
          $ref: "#/components/responses/Error"

  /vehicles/decode:
    post:
      tags: [Vehicles]
      operationId: decodeVin
      summary: Будущее декодирование VIN
      description: |
        FUTURE CONTRACT — endpoint не реализован в manual-first срезе и не должен
        вызываться мобильным клиентом. Будущий provider возвращает только предложения;
        он не создаёт профиль и не перезаписывает подтверждённые пользователем поля.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecodeVinRequest"
            example:
              vin: WVGZZZ5NZKW123456
              mileage:
                value: 84200
                unit: km
              production_year: 2019
              first_use_date: "2019-05-20"
      responses:
        "200":
          description: Результат декодирования без открытого VIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VinDecodeResult"
              example:
                decode_id: 3d7b1dc0-03ca-4b4c-9e56-c11e90aa508a
                status: decoded
                configurations:
                  - id: cfg_tiguan_2019_14tsi
                    make: Volkswagen
                    model: Tiguan
                    generation: II
                    model_year: 2019
                    engine: 1.4 TSI
                    fuel_type: petrol
                    transmission: automatic
                    drivetrain: awd
                    market: EU
                    confidence: 0.98
                expires_at: "2026-07-16T16:30:00Z"
        "401":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"

  /vehicles/confirm:
    post:
      tags: [Vehicles]
      operationId: confirmVehicle
      summary: Будущее подтверждение VIN enrichment
      description: |
        FUTURE CONTRACT — endpoint не реализован в manual-first срезе. Явно принимает
        выбранные пользователем предложения; молчаливое применение provider/AI запрещено.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmVehicleRequest"
      responses:
        "201":
          description: Автомобиль создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "401":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/ValidationError"
        default:
          $ref: "#/components/responses/Error"

  /vehicles/{vehicleId}:
    parameters:
      - $ref: "#/components/parameters/VehicleId"
    get:
      tags: [Vehicles]
      operationId: getVehicle
      summary: Получить профиль автомобиля
      parameters:
        - $ref: "#/components/parameters/AcceptLanguage"
      responses:
        "200":
          description: Профиль только с маской VIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
    patch:
      tags: [Vehicles]
      operationId: updateVehicle
      summary: Исправить разрешённые поля ручного профиля
      description: |
        Частичное обновление с optimistic lock по version. Отсутствующее поле сохраняет
        persisted value; явный null очищает только nullable optional-поле. Backend сначала
        объединяет PATCH с persisted state, затем валидирует итоговый профиль.
        additionalProperties=false запрещает произвольные имена полей. Provenance не стирается:
        изменённое пользователем поле получает source=user и новый confirmed_at,
        прежнее значение остаётся в аудите. Снижение mileage требует
        PUT /vehicles/{vehicleId}/mileage с причиной и подтверждением.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/AcceptLanguage"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVehicleRequest"
            example:
              transmission:
                type: automatic
                gears: 6
              mileage:
                value: 84200
                unit: km
              vin: WVGZZZ5NZKW123456
              version: 1
      responses:
        "200":
          description: Профиль исправлен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/ValidationError"
        default:
          $ref: "#/components/responses/Error"
    delete:
      tags: [Vehicles]
      operationId: deleteVehicle
      summary: Удалить профиль автомобиля
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/AcceptLanguage"
      responses:
        "204":
          description: Автомобиль удалён
        "401":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"

  /vehicles/{vehicleId}/mileage:
    parameters:
      - $ref: "#/components/parameters/VehicleId"
    put:
      tags: [Vehicles]
      operationId: updateVehicleMileage
      summary: Подтвердить наблюдение текущего пробега
      description: |
        Создаёт неизменяемое confirmed observation и обновляет подтверждённую проекцию
        пробега автомобиля. Source этого ручного endpoint всегда `manual`. Атомарно
        обновляет optimistic vehicle version и создаёт новый plan snapshot. Не создаёт
        expense, service record или activity Журнала. Снижение требует явных
        decrease_confirmed + decrease_reason; mobile MVP может пока отклонять снижение.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/AcceptLanguage"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMileageRequest"
            example:
              mileage: {value: 84250, unit: km}
              observed_at: "2026-07-20T09:30:00Z"
              version: 3
      responses:
        "200":
          description: Наблюдение, current mileage и новый план сохранены атомарно
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MileageConfirmation"
              example:
                vehicle_id: 8d7d82eb-619d-458d-b5fb-87c930ba4242
                vehicle_version: 4
                current_mileage: {value: 84250, unit: km}
                observation:
                  id: 38ea4fc4-cf7e-4c5e-bc7c-85e97e631e0f
                  vehicle_id: 8d7d82eb-619d-458d-b5fb-87c930ba4242
                  mileage: {value: 84250, unit: km}
                  source: manual
                  observed_at: "2026-07-20T09:30:00Z"
                  created_at: "2026-07-20T09:30:00Z"
                maintenance_plan_id: c3ecf7b6-eaab-4365-a9df-c1e34a822170
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/ValidationError"
        default:
          $ref: "#/components/responses/Error"

  /vehicles/{vehicleId}/mileage-forecast:
    parameters:
      - $ref: "#/components/parameters/VehicleId"
    get:
      tags: [Vehicles, Maintenance]
      operationId: getVehicleMileageForecast
      summary: Получить вычисленный прогноз пробега
      description: |
        Активный детерминированный read model v1. При менее чем двух пригодных confirmed
        observations возвращает 10000 km/year, method=default_assumption, confidence=low;
        при двух и более использует method=empirical. Оценка явно маркируется и может
        дать только display-only approximate window. Она не записывает mileage, не создаёт
        observation, не меняет status/overdue и не запускает notifications.
      responses:
        "200":
          description: Актуальный прогноз
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MileageForecast"
              example:
                vehicle_id: 8d7d82eb-619d-458d-b5fb-87c930ba4242
                annual_distance: {value: 10000, unit: km}
                method: default_assumption
                confidence: low
                observation_count: 0
                estimate_label: Оценка на основе допущения
                next_work_window: null
                algorithm_version: mileage-forecast-v1
                input_hash: sha256:forecast-input
                calculated_at: "2026-07-20T10:00:00Z"
                last_confirmed_observation: null
        default:
          $ref: "#/components/responses/Error"

  /vehicles/{vehicleId}/condition-observations:
    parameters:
      - $ref: "#/components/parameters/VehicleId"
    get:
      tags: [Maintenance, Consumables]
      operationId: listConditionObservations
      summary: Получить наблюдения фактического износа
      description: |
        Append-only observations numeric MVP subset: brake_pads, brake_discs,
        tire_condition_inspection. Newest first; отсутствие записи не порождает fake %.
      parameters:
        - $ref: "#/components/parameters/AcceptLanguage"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Страница наблюдений
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConditionObservationList"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Maintenance, Consumables]
      operationId: createConditionObservation
      summary: Добавить фактический процент износа
      description: |
        Идемпотентно добавляет новое observation и пересчитывает maintenance-v3 plan.
        wear_percent: 0=new/no wear, 100=fully worn; remaining_percent read-only.
        Install date не требуется. Latest observation feeds plan и consumables, но не
        создаёт OEM remaining-life claim и не вычисляет next due из wear.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/AcceptLanguage"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConditionObservationCreate"
            example:
              work_code: brake_pads
              wear_percent: 76
              observed_at: "2026-07-20"
              mileage: {value: 84250, unit: km}
              source: self
              note: Визуальная оценка
      responses:
        "201":
          description: Наблюдение добавлено, план пересчитан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConditionObservationCreateResult"
              example:
                observation:
                  id: 6a17dc13-cb98-42d5-82a2-07be550d44df
                  vehicle_id: 8d7d82eb-619d-458d-b5fb-87c930ba4242
                  work_code: brake_pads
                  wear_percent: 76
                  remaining_percent: 24
                  observed_at: "2026-07-20"
                  mileage: {value: 84250, unit: km}
                  source: self
                  note: Визуальная оценка
                  created_at: "2026-07-20T10:15:00Z"
                maintenance_plan_id: c3ecf7b6-eaab-4365-a9df-c1e34a822170
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/ValidationError"
        default:
          $ref: "#/components/responses/Error"

  /vehicles/{vehicleId}/plan-item-ui-preferences:
    x-future-contract: true
    description: |
      Dormant/reversible contract. Активные Laravel routes отсутствуют, mobile MVP
      не читает и не записывает preferences. Существующая таблица может сохраняться,
      но preference никогда не влияет на plan, comparator/order, warnings или notifications.
    parameters:
      - $ref: "#/components/parameters/VehicleId"
    get:
      tags: [Maintenance]
      operationId: listPlanItemUiPreferences
      summary: Получить визуальные настройки пунктов плана
      description: |
        Future-only presentation overlay keyed by work_code. Не входит в active contract.
        Preferences не меняют plan/comparator/order/warnings/notifications и не входят
        в snapshot input_hash/content_hash.
      responses:
        "200":
          description: Все сохранённые preferences автомобиля
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanItemUiPreferenceList"
              example:
                items:
                  - vehicle_id: 8d7d82eb-619d-458d-b5fb-87c930ba4242
                    work_code: brake_pads
                    collapsed: true
                    version: 1
                    created_at: "2026-07-20T10:20:00Z"
                    updated_at: "2026-07-20T10:20:00Z"
        default:
          $ref: "#/components/responses/Error"
    put:
      tags: [Maintenance]
      operationId: putPlanItemUiPreference
      summary: Будущая настройка скрытия пункта плана
      description: |
        Idempotent upsert одного work_code. version=0 означает create; для существующей
        строки требуется текущая optimistic version, stale version возвращает 409.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
