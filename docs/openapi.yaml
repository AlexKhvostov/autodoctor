            - type: "null"
        primary_category:
          $ref: "#/components/schemas/EventPrimaryCategory"
        action_level:
          $ref: "#/components/schemas/ActionLevel"
        basis:
          $ref: "#/components/schemas/PresentationBasis"
    FutureEventPresentation:
