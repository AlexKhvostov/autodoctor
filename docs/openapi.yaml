      type: object
      additionalProperties: false
      required: [type, forecast_window, confidence, presentation]
      properties:
        type:
          type: string
          const: forecast_window
        forecast_window:
          $ref: "#/components/schemas/MileageForecastWindow"
        confidence:
          type: number
          minimum: 0
          maximum: 1
        presentation:
          $ref: "#/components/schemas/FutureEventPresentation"
    TimelineItem:
      oneOf:
        - $ref: "#/components/schemas/TimelineServiceRecordItem"
        - $ref: "#/components/schemas/TimelinePlanItem"
      discriminator:
        propertyName: type
        mapping:
          service_record: "#/components/schemas/TimelineServiceRecordItem"
          plan_item: "#/components/schemas/TimelinePlanItem"
    VehicleTimeline:
      type: object
      additionalProperties: false
      required: [vehicle_id, generated_at, last_confirmed_observation, nearest_consumables, items]
      properties:
        vehicle_id:
          type: string
          format: uuid
        generated_at:
          type: string
          format: date-time
        last_confirmed_observation:
          oneOf:
            - $ref: "#/components/schemas/MileageObservation"
            - type: "null"
          description: Вместе с generated_at используется клиентом для current marker.
        nearest_consumables:
          type: array
          maxItems: 3
          description: |
            Отсортированный ближайший срез той же read-only проекции. Общий v3 comparator:
            unresolved history first; внутри неё safety_critical, high, затем остальные;
            далее resolved critical attention/overdue/soon/current по urgency, importance
            и earliest known due; tie-break work_code, id. Collapsed preference не участвует.
          items:
            $ref: "#/components/schemas/ConsumableProjection"
        items:
          type: array
          description: |
            Активный v3 union: persisted service_record до current marker, затем future
            plan_item по общему comparator. UI preference применяется только overlay.
          items:
            $ref: "#/components/schemas/TimelineItem"

